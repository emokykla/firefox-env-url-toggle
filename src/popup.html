<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 6px;
            min-width: 200px;
            font-family: -apple-system, "Segoe UI", sans-serif;
            font-size: 14px;
        }
        h2 {
            margin: 6px 4px 2px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #737373;
        }
        button {
            display: block;
            width: 100%;
            margin: 2px 0;
            padding: 8px 10px;
            border: none;
            border-radius: 4px;
            background: #f0f0f4;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background: #d7d7db;
        }
        button.current {
            background: #dceaff;
            cursor: default;
        }
        button .url {
            float: right;
            margin-left: 10px;
            color: #737373;
            font-size: 11px;
        }
        .empty {
            padding: 8px 4px;
            color: #737373;
        }
        #manage {
            margin-top: 6px;
            background: none;
            color: #0060df;
            font-size: 12px;
        }
        #manage:hover {
            text-decoration: underline;
            background: none;
        }
    </style>
</head>
<body>
    <div id="content"></div>
    <button id="manage">⚙ Manage projects</button>
    <script src="common.js"></script>
    <script src="popup.js"></script>
</body>
</html>
